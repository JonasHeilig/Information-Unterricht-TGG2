<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ids</title>
    <style>
        .gelb {
            background-color: yellow;
        }

        #grün {
            background-color: green;
        }
    </style>
</head>
<body>
    <p class="gelb" id="grün">Dieser Absatz ruft sowohl die Klasse "gelb" als auch die ID "grün" auf. Die ID gewintt den konflikt und hat die höhere Priorität.</p>
</html>
