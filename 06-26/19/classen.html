<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Class</title>
    <style>
        .kursiv {
            font-style: italic;
        }

        .farberot {
            color: red;
        }
    </style>
</head>
<body>
    <p class="kursiv">Dieser Abasatz gehört zur Klasse kursiv</p>
    <p class="farberot">Dieser Abasatz gehört zur Klasse farberot</p>
    <p class="kursiv farberot">Dieser Absatz gehört zu beiden Klassen</p>
</body>
</html>
