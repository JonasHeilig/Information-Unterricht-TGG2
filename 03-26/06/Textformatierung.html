<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Document</title>
    </head>
    <body>
        <p>In diesem Satz hat es <b>fette</b> Passagen und <blink>blinkende Worte</blink>.</p>
        <!-- Blink geht nicht mehr -->
        <center>Dieser Satz ist Zentriert</center>
        <p>Einige Worte erscheinen in anderen <font color="red">Farben</font>, <i>kursiv</i> oder auch <sub>tief-</sub> oder <sup>hochgestellt</sup> .</p>
        <p>Text im <tt>Terminalstiel</tt> und ebenso <u>unterstrichen</u> Text hat es in diesem Beispiel.</p>
    </body>
</html>

<!-- tt auch mit code ersetzbar-->
<!-- In <font></font> sind die HTML Tags.-->
<!-- color ist ein Atrebut-->
<!--Dem Atrebut von einem HTML Tag wird ein Wert zugewiesen-->
